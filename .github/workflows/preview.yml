name: Preview Build

on:
  pull_request:
    branches: [main]
    paths:
      - "frontend/**"
      - ".github/workflows/preview.yml"

# The "Comment build link" step posts to the PR via the GitHub REST API.
# GitHub Actions default-token permissions changed to read-only in 2023;
# without explicit grants the step fails with "Resource not accessible
# by integration" (403). Same failure observed on the v1.0.22 PR (May
# 2026) and the blueprint fix PRs (Feb 2026) — long-standing chronic
# bug fixed here as part of v1.0.35 housekeeping.
permissions:
  contents: read
  pull-requests: write
  issues: write

jobs:
  preview-build:
    name: EAS Preview Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Setup EAS
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Install dependencies
        run: npm ci

      - name: Build preview
        run: eas build --profile preview --platform all --non-interactive

      - name: Comment build link
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: 'Preview build started! Check [EAS dashboard](https://expo.dev) for build status.'
            })
