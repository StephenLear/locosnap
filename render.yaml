services:
  - type: web
    name: locosnap-api
    runtime: node
    region: eu-west  # UK-centric app
    rootDir: backend
    buildCommand: npm install --include=dev && npm run build
    startCommand: npm start
    plan: free
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: "3000"
      - key: FRONTEND_URL
        sync: false  # Set in dashboard after deploying frontend
      - key: ANTHROPIC_API_KEY
        sync: false  # Set in dashboard
      - key: OPENAI_API_KEY
        sync: false  # Set in dashboard
      - key: REPLICATE_API_TOKEN
        sync: false  # Set in dashboard (optional)
      - key: UPSTASH_REDIS_REST_URL
        sync: false  # Upstash REST URL — set in dashboard (Connect → REST tab)
      - key: UPSTASH_REDIS_REST_TOKEN
        sync: false  # Upstash REST token — set in dashboard (Connect → REST tab)
      - key: SUPABASE_URL
        sync: false  # Set in dashboard
      - key: SUPABASE_SERVICE_KEY
        sync: false  # Set in dashboard
      - key: POSTHOG_API_KEY
        sync: false  # Set in dashboard (optional)
      - key: POSTHOG_HOST
        value: https://us.i.posthog.com
      - key: SENTRY_DSN
        sync: false  # Set in dashboard (optional)
      - key: REVENUECAT_WEBHOOK_SECRET
        sync: false  # Set in dashboard (optional)
    healthCheckPath: /api/health
    autoDeploy: true  # Deploy on push to main (filtered to backend changes below)
    # Only trigger Render deploys when backend files actually change.
    # Without this, every push to main (including docs-only and frontend-only
    # commits) fires a Render redeploy window — which manifests as a Sentry
    # "Could not connect to LocoSnap servers" regression for any in-flight
    # /api/identify calls. Pattern confirmed 2026-05-10 evening + 2026-05-11
    # midday. Doc and frontend changes never touch the backend runtime, so
    # they shouldn't redeploy it.
    buildFilter:
      paths:
        - backend/**
        - render.yaml
